name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:  # added using https://github.com/step-security/secure-repo
  contents: read

jobs:
  audit:
    name: Formula Audit
    runs-on: macos-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Tap local checkout
        run: |
          mkdir -p "$(brew --repository)/Library/Taps/arcavenae"
          ln -sf "$GITHUB_WORKSPACE" "$(brew --repository)/Library/Taps/arcavenae/homebrew-tap"

      - name: Audit formulas
        run: |
          for f in Formula/*.rb; do
            name="$(basename "$f" .rb)"
            brew audit --strict "arcavenae/tap/$name"
          done

      - name: Check style
        run: |
          for f in Formula/*.rb; do
            name="$(basename "$f" .rb)"
            brew style "arcavenae/tap/$name"
          done
